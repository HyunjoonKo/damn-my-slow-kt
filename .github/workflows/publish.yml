name: Publish to npm

on:
  push:
    branches: [main]
    paths: ['src/**', 'package.json']
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for more commits
        if: github.event_name == 'push'
        run: sleep 300

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view damn-my-slow-kt version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-bump patch version
        if: steps.version.outputs.changed == 'false'
        id: autobump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          npm version patch --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: bump version to v${NEW} [skip ci]"
          git push origin main
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Resolve final version
        id: final
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true' || steps.autobump.outputs.version != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: steps.version.outputs.changed == 'true' || steps.autobump.outputs.version != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ steps.final.outputs.version }}"
          git push origin "v${{ steps.final.outputs.version }}"

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true' || steps.autobump.outputs.version != ''
        run: |
          gh release create "v${{ steps.final.outputs.version }}" \
            --title "v${{ steps.final.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
